<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — ArtStore</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="login-page">
    <div class="login-card">
      <!-- Brand -->
      <div class="login-brand">ArtStore</div>
      <p class="login-sub">Admin Panel</p>

      <!-- Lock icon -->
      <div style="margin-bottom:28px">
        <div style="width:64px;height:64px;border-radius:50%;background:rgba(226,160,63,.12);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:1.6rem">
          🔒
        </div>
      </div>

      <!-- Error -->
      <p id="login-err" class="login-err" role="alert"></p>

      <!-- Form -->
      <div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" id="password" type="password"
            placeholder="Enter admin password" autocomplete="current-password">
          <p class="form-error" id="pass-err">Password is required.</p>
        </div>

        <button id="login-btn" class="btn btn-primary btn-full" style="margin-top:8px;border-radius:50px">
          Sign In →
        </button>
      </div>

      <p style="margin-top:24px;font-size:.8rem;color:var(--muted)">
        <a href="index.html" style="color:var(--accent)">← Back to Store</a>
      </p>
    </div>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (Storage.isAdminAuthed()) window.location.replace('admin.html');

    UI.initTheme();

    const passInp = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-err');

    function doLogin() {
      const pwd = passInp.value;
      if (!pwd) {
        passInp.classList.add('error');
        document.getElementById('pass-err').style.display = 'block';
        return;
      }
      passInp.classList.remove('error');
      document.getElementById('pass-err').style.display = 'none';

      if (Auth.login(pwd)) {
        loginBtn.textContent = '✓ Signing in…';
        loginBtn.disabled = true;
        setTimeout(() => window.location.href = 'admin.html', 400);
      } else {
        errEl.textContent = 'Incorrect password. Please try again.';
        errEl.style.display = 'block';
        passInp.value = '';
        passInp.focus();
        // Shake animation
        passInp.style.animation = 'none';
        passInp.offsetHeight; // reflow
        passInp.style.borderColor = 'var(--rose)';
        setTimeout(() => passInp.style.borderColor = '', 1500);
      }
    }

    loginBtn.addEventListener('click', doLogin);
    passInp.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    passInp.addEventListener('input', () => {
      errEl.style.display = 'none';
      passInp.classList.remove('error');
    });
  </script>
</body>
</html>
